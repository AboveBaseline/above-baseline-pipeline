<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Above Baseline — Review Dashboard</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap');

  :root {
    --orange: #E8610A;
    --orange-light: #FDF0E8;
    --blue: #1A5FA8;
    --blue-light: #E8F1FB;
    --white: #FFFFFF;
    --off-white: #F7F8FA;
    --gray-light: #EEEEF0;
    --gray-mid: #9A9BA3;
    --text-primary: #1A1B1F;
    --text-secondary: #5A5C66;
    --border: #E2E3E8;
    --green: #1A6A45;
    --green-light: #E2F4EE;
    --red-light: #FDE8D6;
    --red: #A03D0A;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans', sans-serif;
    background: var(--off-white);
    color: var(--text-primary);
    min-height: 100vh;
  }

  .header {
    background: var(--blue);
    padding: 0 32px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 56px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo { font-size: 16px; font-weight: 600; color: white; letter-spacing: -0.3px; }
  .logo span { color: #7CB9F4; }
  .header-sub { font-family: 'IBM Plex Mono', monospace; font-size: 11px; color: rgba(255,255,255,0.5); margin-left: 10px; }

  .header-right { display: flex; align-items: center; gap: 12px; }

  .date-pill {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
    background: rgba(255,255,255,0.1);
    padding: 4px 10px;
    border-radius: 4px;
  }

  .container { max-width: 900px; margin: 0 auto; padding: 28px 24px; }

  /* LOAD PANEL */
  .load-panel {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 28px;
    margin-bottom: 20px;
    text-align: center;
  }

  .load-title { font-size: 18px; font-weight: 600; margin-bottom: 8px; }
  .load-sub { font-size: 14px; color: var(--text-secondary); margin-bottom: 20px; }

  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 10px;
    padding: 40px;
    cursor: pointer;
    transition: border-color 0.15s, background 0.15s;
    margin-bottom: 16px;
  }

  .drop-zone:hover { border-color: var(--orange); background: var(--orange-light); }
  .drop-zone-text { font-size: 14px; color: var(--gray-mid); }
  .drop-zone-hint { font-size: 12px; color: var(--gray-mid); margin-top: 6px; font-family: 'IBM Plex Mono', monospace; }

  /* CONFIG */
  .config-row {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
    text-align: left;
  }

  .config-field label { font-size: 11px; font-weight: 600; color: var(--text-secondary); display: block; margin-bottom: 4px; }
  .config-field input {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 7px; font-size: 12px; font-family: 'IBM Plex Mono', monospace;
    outline: none; background: var(--off-white);
  }
  .config-field input:focus { border-color: var(--blue); background: var(--white); }

  /* STORY CARDS */
  .section-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px;
  }

  .section-title { font-size: 11px; font-weight: 600; letter-spacing: 0.6px; text-transform: uppercase; color: var(--gray-mid); }

  .approve-all-btn {
    font-size: 12px; font-weight: 500; color: var(--green);
    background: var(--green-light); border: 1px solid #A8D8C0;
    padding: 5px 12px; border-radius: 6px; cursor: pointer;
  }

  .story-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 12px;
    overflow: hidden;
    transition: border-color 0.15s;
  }

  .story-card.approved { border-color: var(--green); }
  .story-card.rejected { opacity: 0.4; }
  .story-card.posted { border-color: var(--blue); background: var(--blue-light); }

  .card-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px; border-bottom: 1px solid var(--gray-light);
    gap: 12px;
  }

  .card-header-left { display: flex; align-items: center; gap: 10px; flex: 1; min-width: 0; }

  .cat-badge {
    font-size: 10px; font-weight: 700; letter-spacing: 0.5px;
    text-transform: uppercase; padding: 3px 8px; border-radius: 4px;
    white-space: nowrap; flex-shrink: 0;
  }

  .cat-sm    { background: #FDE8D6; color: #A03D0A; }
  .cat-adc   { background: #E8F0FD; color: #1A4DA8; }
  .cat-ada   { background: #F0EAF8; color: #5C3A8C; }
  .cat-pkpd  { background: #E2F4EE; color: #1A6A45; }
  .cat-picks { background: #FFF3D6; color: #8A5A00; }

  .card-title-preview {
    font-size: 14px; font-weight: 500; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }

  .card-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .btn {
    padding: 6px 14px; border-radius: 6px; font-size: 12px;
    font-weight: 600; cursor: pointer; border: none;
    transition: all 0.15s; font-family: 'IBM Plex Sans', sans-serif;
    white-space: nowrap;
  }

  .btn-approve { background: var(--green-light); color: var(--green); border: 1px solid #A8D8C0; }
  .btn-approve.active { background: var(--green); color: white; }
  .btn-skip { background: var(--red-light); color: var(--red); border: 1px solid #F5C09A; }
  .btn-edit { background: var(--off-white); color: var(--text-secondary); border: 1px solid var(--border); }
  .btn-primary { background: var(--orange); color: white; padding: 10px 20px; font-size: 13px; border-radius: 8px; }
  .btn-primary:hover { background: #C4510A; }
  .btn-primary:disabled { background: var(--gray-mid); cursor: not-allowed; }
  .btn-posted { background: var(--blue-light); color: var(--blue); border: 1px solid #B5D4F4; }

  .card-body { padding: 16px 18px; display: none; }
  .card-body.open { display: block; }

  .edit-label { font-size: 11px; font-weight: 600; color: var(--gray-mid); margin-bottom: 5px; letter-spacing: 0.3px; }

  .edit-title {
    width: 100%; padding: 8px 12px; border: 1px solid var(--border);
    border-radius: 7px; font-size: 14px; font-weight: 500;
    font-family: 'IBM Plex Sans', sans-serif; margin-bottom: 12px; outline: none;
  }
  .edit-title:focus { border-color: var(--orange); }

  .edit-content {
    width: 100%; padding: 10px 12px; border: 1px solid var(--border);
    border-radius: 7px; font-size: 13px; font-family: 'IBM Plex Sans', sans-serif;
    line-height: 1.65; resize: vertical; min-height: 100px; outline: none;
    color: var(--text-secondary);
  }
  .edit-content:focus { border-color: var(--orange); }

  .card-meta {
    display: flex; gap: 10px; flex-wrap: wrap; margin-top: 10px;
    font-size: 11px; color: var(--gray-mid); font-family: 'IBM Plex Mono', monospace;
  }

  /* PUBLISH BAR */
  .publish-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--white); border-top: 1px solid var(--border);
    padding: 14px 32px; display: none;
    align-items: center; justify-content: space-between; gap: 16px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.06);
    z-index: 100;
  }

  .publish-bar.visible { display: flex; }

  .publish-info { font-size: 14px; color: var(--text-secondary); }
  .publish-info strong { color: var(--text-primary); }

  /* STATUS */
  .status-msg {
    background: var(--blue); color: white; border-radius: 8px;
    padding: 12px 16px; font-size: 13px; margin-bottom: 16px;
    display: none; align-items: center; gap: 8px;
  }
  .status-msg.visible { display: flex; }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #7CB9F4; animation: pulse 1.2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .spacer { height: 80px; }
</style>
</head>
<body>

<div class="header">
  <div style="display:flex;align-items:center;">
    <div class="logo">Above <span>Baseline</span></div>
    <div class="header-sub">Review Dashboard</div>
  </div>
  <div class="header-right">
    <div class="date-pill" id="today-date"></div>
  </div>
</div>

<div class="container">

  <!-- LOAD PANEL -->
  <div class="load-panel" id="load-panel">
    <div class="load-title">Morning Story Review</div>
    <div class="load-sub">Load today's AI-generated drafts, review, edit, and publish approved stories to Above Baseline.</div>

    <div class="drop-zone" onclick="document.getElementById('file-input').click()" id="drop-zone">
      <div class="drop-zone-text">📂 Click to load today's draft file</div>
      <div class="drop-zone-hint">drafts/YYYY-MM-DD.json</div>
    </div>
    <input type="file" id="file-input" accept=".json" style="display:none" onchange="loadDraftFile(event)" />

    <div class="config-row">
      <div class="config-field">
        <label>WordPress URL</label>
        <input type="text" id="wp-url" placeholder="https://abovebaseline.blog" />
      </div>
      <div class="config-field">
        <label>WP Username</label>
        <input type="text" id="wp-user" placeholder="your username" />
      </div>
      <div class="config-field">
        <label>WP Password</label>
        <input type="password" id="wp-pass" placeholder="your password" />
      </div>
    </div>
  </div>

  <!-- STATUS -->
  <div class="status-msg" id="status-msg">
    <div class="status-dot"></div>
    <span id="status-text"></span>
  </div>

  <!-- STORIES -->
  <div id="stories-section" style="display:none;">
    <div class="section-header">
      <div class="section-title" id="draft-date-label"></div>
      <button class="approve-all-btn" onclick="approveAll()">Approve All</button>
    </div>
    <div id="stories-list"></div>
  </div>

  <div class="spacer"></div>
</div>

<!-- PUBLISH BAR -->
<div class="publish-bar" id="publish-bar">
  <div class="publish-info"><strong id="approved-count">0</strong> stories approved and ready to publish</div>
  <div style="display:flex;gap:10px;">
    <button class="btn btn-primary" id="publish-btn" onclick="publishApproved()">Publish to Above Baseline</button>
  </div>
</div>

<script>
let stories = [];
const CAT_CLASSES = {
  'Small Molecule': 'cat-sm',
  'ADCs': 'cat-adc',
  'ADA & Immunogenicity': 'cat-ada',
  'PK/PD': 'cat-pkpd',
  'My Picks': 'cat-picks',
};

const CATEGORY_IDS = {
  'Small Molecule': 6,
  'ADCs': 3,
  'ADA & Immunogenicity': 4,
  'PK/PD': 5,
  'My Picks': 7,
};

document.getElementById('today-date').textContent = new Date().toLocaleDateString('en-US', {weekday:'short',month:'short',day:'numeric',year:'numeric'});

// Drag and drop
const dropZone = document.getElementById('drop-zone');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.style.borderColor = 'var(--orange)'; });
dropZone.addEventListener('dragleave', () => { dropZone.style.borderColor = ''; });
dropZone.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file) readFile(file);
});

function loadDraftFile(event) {
  const file = event.target.files[0];
  if (file) readFile(file);
}

function readFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      stories = (data.stories || []).map((s, i) => ({
        ...s, id: i, approved: false, rejected: false, posted: false, open: false
      }));
      document.getElementById('draft-date-label').textContent = `Drafts for ${data.date || 'today'} — ${stories.length} stories`;
      document.getElementById('load-panel').style.display = 'none';
      document.getElementById('stories-section').style.display = 'block';
      renderStories();
    } catch(err) {
      alert('Could not read file. Make sure it is a valid JSON draft file.');
    }
  };
  reader.readAsText(file);
}

function renderStories() {
  const list = document.getElementById('stories-list');
  list.innerHTML = stories.map(s => `
    <div class="story-card ${s.approved ? 'approved' : ''} ${s.rejected ? 'rejected' : ''} ${s.posted ? 'posted' : ''}" id="card-${s.id}">
      <div class="card-header">
        <div class="card-header-left">
          <span class="cat-badge ${CAT_CLASSES[s.category] || 'cat-picks'}">${s.category}</span>
          <div class="card-title-preview">${s.title}</div>
        </div>
        <div class="card-actions">
          ${s.posted
            ? '<span class="btn btn-posted">✓ Published</span>'
            : `
              <button class="btn btn-edit" onclick="toggleEdit(${s.id})">Edit</button>
              <button class="btn btn-approve ${s.approved ? 'active' : ''}" onclick="toggleApprove(${s.id})">${s.approved ? '✓ Approved' : 'Approve'}</button>
              <button class="btn btn-skip" onclick="toggleSkip(${s.id})">${s.rejected ? 'Skipped' : 'Skip'}</button>
            `
          }
        </div>
      </div>
      <div class="card-body ${s.open ? 'open' : ''}" id="body-${s.id}">
        <div class="edit-label">Headline</div>
        <input class="edit-title" id="title-${s.id}" value="${escHtml(s.title)}" onchange="stories[${s.id}].title = this.value" />
        <div class="edit-label">Content</div>
        <textarea class="edit-content" id="content-${s.id}" onchange="stories[${s.id}].content = this.value">${escHtml(s.content)}</textarea>
        <div class="card-meta">
          <span>${s.source_name || ''}</span>
          <span>·</span>
          <span>${s.date || ''}</span>
          <span>·</span>
          <span>${s.read_time || '3 min read'}</span>
          ${s.source_url ? `<span>·</span><a href="${s.source_url}" target="_blank" style="color:var(--blue);">Source ↗</a>` : ''}
        </div>
      </div>
    </div>
  `).join('');

  updatePublishBar();
}

function escHtml(str) {
  return String(str || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function toggleEdit(id) {
  stories[id].open = !stories[id].open;
  renderStories();
}

function toggleApprove(id) {
  stories[id].approved = !stories[id].approved;
  if (stories[id].approved) stories[id].rejected = false;
  renderStories();
}

function toggleSkip(id) {
  stories[id].rejected = !stories[id].rejected;
  if (stories[id].rejected) stories[id].approved = false;
  renderStories();
}

function approveAll() {
  stories.forEach(s => { if (!s.posted) { s.approved = true; s.rejected = false; } });
  renderStories();
}

function updatePublishBar() {
  const count = stories.filter(s => s.approved && !s.posted).length;
  document.getElementById('approved-count').textContent = count;
  document.getElementById('publish-bar').classList.toggle('visible', count > 0);
}

function setStatus(text, visible=true) {
  document.getElementById('status-text').textContent = text;
  document.getElementById('status-msg').classList.toggle('visible', visible);
}

async function publishApproved() {
  const wpUrl = document.getElementById('wp-url').value.trim().replace(/\/$/, '') ||
                prompt('Enter your WordPress URL (e.g. https://abovebaseline.blog):');
  const wpUser = document.getElementById('wp-user').value.trim() || prompt('WordPress username:');
  const wpPass = document.getElementById('wp-pass').value.trim() || prompt('WordPress password:');
  
  if (!wpUrl || !wpUser || !wpPass) { alert('WordPress credentials required.'); return; }
  
  const approved = stories.filter(s => s.approved && !s.posted);
  document.getElementById('publish-btn').disabled = true;

  const credentials = btoa(wpUser + ':' + wpPass);
  let posted = 0;

  for (const story of approved) {
    setStatus(`Posting: "${story.title.substring(0, 60)}..."`);
    const catId = CATEGORY_IDS[story.category] || 7;
    const content = `<p>${story.content}</p>\n\n<p><strong>Source:</strong> <a href="${story.source_url || '#'}" target="_blank" rel="noopener">${story.source_name} ↗</a></p>`;

    try {
      const res = await fetch(`${wpUrl}/wp-json/wp/v2/posts`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Basic ' + credentials
        },
        body: JSON.stringify({
          title: story.title,
          content,
          status: 'publish',
          categories: [catId],
        })
      });

      if (res.ok) {
        story.posted = true;
        story.approved = false;
        posted++;
        renderStories();
      } else {
        const err = await res.json();
        setStatus(`Failed: ${err.message || 'Check credentials'}`);
      }
    } catch(e) {
      setStatus('Network error: ' + e.message);
    }
  }

  setStatus(`✓ ${posted} story${posted !== 1 ? 'ies' : 'y'} published!`);
  document.getElementById('publish-btn').disabled = false;
  setTimeout(() => setStatus('', false), 5000);
}
  async function autoLoadLatest() {
  try {
    const res = await fetch('drafts/latest.json');
    if (!res.ok) throw new Error('No JSON found');

    const data = await res.json();

    stories = (data.stories || []).map((s, i) => ({
      ...s,
      id: i,
      approved: false,
      rejected: false,
      posted: false,
      open: false
    }));

    document.getElementById('draft-date-label').textContent =
      `Drafts for ${data.date || 'today'} — ${stories.length} stories`;

    document.getElementById('load-panel').style.display = 'none';
    document.getElementById('stories-section').style.display = 'block';

    renderStories();

  } catch (e) {
    console.log('Auto load failed, using manual upload');
  }
}
  autoLoadLatest();
</script>
</body>
</html>
